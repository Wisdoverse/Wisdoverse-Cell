# =============================================================================
# Docker Compose Override - Production Settings
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Production best practices:
#   - Use pre-built images from registry
#   - No source code mounts
#   - Stricter resource limits
#   - No debug ports exposed
#   - Health check optimizations
#   - Explicit INTERNAL_TRANSPORT_PROTECTION declaration
#
# =============================================================================

services:
  ai-core:
    image: ${REGISTRY}projectcell/ai-core:${VERSION}
    build: !reset null
    container_name: !reset null
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      APP_ENV: production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  gateway:
    image: ${REGISTRY}projectcell/gateway:${VERSION}
    build: !reset null
    container_name: !reset null
    environment:
      GATEWAY_SERVER_MODE: release
      GATEWAY_LOG_LEVEL: info
      GATEWAY_LOG_FORMAT: json
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  sync-agent:
    image: ${REGISTRY}projectcell/sync-agent:${VERSION}
    build: !reset null
    container_name: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
    deploy:
      replicas: ${SYNC_AGENT_REPLICAS:-1}
      resources:
