          memory: 1G

  redis:
    ports: !reset []  # Don't expose in production
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
      --requirepass ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  milvus:
    ports: !reset []  # Don't expose in production
