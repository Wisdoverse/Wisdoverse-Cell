[databases]
projectcell = host=postgres port=5432 dbname=projectcell
projectcell_ro = host=pg-replica port=5432 dbname=projectcell

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

server_connect_timeout = 10
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

admin_users = projectcell
stats_users = projectcell
