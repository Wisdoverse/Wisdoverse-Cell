# =============================================================================
# Production Overrides
# =============================================================================
# - Pre-built images (no local builds)
# - No debug ports exposed
# - Stricter resource limits
# - Rolling update strategy
# - Explicit INTERNAL_TRANSPORT_PROTECTION declaration
# =============================================================================

services:
  ai-core:
    image: ${REGISTRY}projectcell/ai-core:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      APP_ENV: production
    deploy:
      replicas: ${AI_CORE_REPLICAS:-3}
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  gateway:
    image: ${REGISTRY}projectcell/rust-gateway:${VERSION}
    build: !reset null
    environment:
      GATEWAY_IMPLEMENTATION: rust
      GATEWAY_SERVER_MODE: release
      GATEWAY_LOG_LEVEL: info
      GATEWAY_LOG_FORMAT: json
    labels:
      - "traefik.http.routers.gateway.rule=Host(`${GATEWAY_HOST:?GATEWAY_HOST is required}`) && PathPrefix(`/`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls=true"
      - "traefik.http.routers.gateway.tls.certresolver=letsencrypt"
    deploy:
      replicas: ${GATEWAY_REPLICAS:-3}
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  sync-module:
    image: ${REGISTRY}projectcell/sync-module:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${SYNC_MODULE_DB_PASSWORD:?SYNC_MODULE_DB_PASSWORD is required}
    deploy:
      replicas: ${SYNC_MODULE_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  analysis-module:
    image: ${REGISTRY}projectcell/analysis-module:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${ANALYSIS_MODULE_DB_PASSWORD:?ANALYSIS_MODULE_DB_PASSWORD is required}
    deploy:
      replicas: ${ANALYSIS_MODULE_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  pjm-agent:
    image: ${REGISTRY}projectcell/pjm-agent:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${PM_AGENT_DB_PASSWORD:?PM_AGENT_DB_PASSWORD is required}
    deploy:
      replicas: ${PM_AGENT_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  chat-agent:
    image: ${REGISTRY}projectcell/chat-agent:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${CHAT_AGENT_DB_PASSWORD:?CHAT_AGENT_DB_PASSWORD is required}
    deploy:
      replicas: ${CHAT_AGENT_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  qa-agent:
    image: ${REGISTRY}projectcell/qa-agent:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${QA_AGENT_DB_PASSWORD:?QA_AGENT_DB_PASSWORD is required}
    deploy:
      replicas: ${QA_AGENT_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  dev-agent:
    image: ${REGISTRY}projectcell/dev-agent:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${DEV_AGENT_DB_PASSWORD:?DEV_AGENT_DB_PASSWORD is required}
    deploy:
      replicas: ${DEV_AGENT_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  evolution-module:
    image: ${REGISTRY}projectcell/evolution-module:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${EVOLUTION_MODULE_DB_PASSWORD:?EVOLUTION_MODULE_DB_PASSWORD is required}
    deploy:
      replicas: ${EVOLUTION_MODULE_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  web:
    image: ${REGISTRY}projectcell/web:${VERSION}
    build: !reset null
    restart: unless-stopped
    deploy:
      replicas: ${WEB_REPLICAS:-2}
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  postgres:
    environment:
      APP_ENV: production
      CHAT_AGENT_DB_PASSWORD: ${CHAT_AGENT_DB_PASSWORD:?CHAT_AGENT_DB_PASSWORD is required}
      PM_AGENT_DB_PASSWORD: ${PM_AGENT_DB_PASSWORD:?PM_AGENT_DB_PASSWORD is required}
      SYNC_MODULE_DB_PASSWORD: ${SYNC_MODULE_DB_PASSWORD:?SYNC_MODULE_DB_PASSWORD is required}
      ANALYSIS_MODULE_DB_PASSWORD: ${ANALYSIS_MODULE_DB_PASSWORD:?ANALYSIS_MODULE_DB_PASSWORD is required}
      QA_AGENT_DB_PASSWORD: ${QA_AGENT_DB_PASSWORD:?QA_AGENT_DB_PASSWORD is required}
      DEV_AGENT_DB_PASSWORD: ${DEV_AGENT_DB_PASSWORD:?DEV_AGENT_DB_PASSWORD is required}
      EVOLUTION_MODULE_DB_PASSWORD: ${EVOLUTION_MODULE_DB_PASSWORD:?EVOLUTION_MODULE_DB_PASSWORD is required}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  traefik:
    command:
      - --api.dashboard=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.grpc.address=:50051
      - --entrypoints.grpc.http2.maxConcurrentStreams=250
      - --entrypoints.traefik.address=:8081
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=${COMPOSE_PROJECT_NAME:-projectcell}_frontend
      - --providers.docker.watch=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --metrics.prometheus=true
      - --metrics.prometheus.entryPoint=traefik
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addServicesLabels=true
      - --metrics.prometheus.addRoutersLabels=true
      - --accesslog=true
      - --accesslog.format=json
      - --accesslog.filters.statuscodes=400-599
      - --log.level=WARN
      - --log.format=json
      - --ping=true
      - --ping.entryPoint=traefik
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:?TRAEFIK_ACME_EMAIL is required}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${GRPC_PORT:-50051}:50051"
    volumes: !override
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  redis-master:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        set -e
        REDIS_ARGS="/usr/local/etc/redis/redis.conf --maxmemory 512mb"
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server $$REDIS_ARGS --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server $$REDIS_ARGS
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  traefik_letsencrypt:
    name: ${COMPOSE_PROJECT_NAME:-projectcell}_traefik_letsencrypt
