# =============================================================================
# Production Overrides
# =============================================================================
# - Pre-built images (no local builds)
# - No debug ports exposed
# - Stricter resource limits
# - Rolling update strategy
# - Explicit INTERNAL_TRANSPORT_PROTECTION declaration
# =============================================================================

services:
  ai-core:
    image: ${REGISTRY}projectcell/ai-core:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      APP_ENV: production
    deploy:
      replicas: ${AI_CORE_REPLICAS:-3}
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  gateway:
    image: ${REGISTRY}projectcell/gateway:${VERSION}
    build: !reset null
    environment:
      GATEWAY_SERVER_MODE: release
      GATEWAY_LOG_LEVEL: info
      GATEWAY_LOG_FORMAT: json
    deploy:
      replicas: ${GATEWAY_REPLICAS:-3}
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  sync-agent:
    image: ${REGISTRY}projectcell/sync-agent:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${SYNC_AGENT_DB_PASSWORD:?SYNC_AGENT_DB_PASSWORD is required}
    deploy:
      replicas: ${SYNC_AGENT_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  analysis-agent:
