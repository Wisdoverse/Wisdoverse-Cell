      POSTGRES_PASSWORD: ${QA_AGENT_DB_PASSWORD:?QA_AGENT_DB_PASSWORD is required}
    deploy:
      replicas: ${QA_AGENT_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
