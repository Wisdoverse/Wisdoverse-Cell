# =============================================================================
# Production Overrides
# =============================================================================
# - Pre-built images (no local builds)
# - No debug ports exposed
# - Stricter resource limits
# - Rolling update strategy
# =============================================================================

services:
  ai-core:
    image: ${REGISTRY}projectcell/ai-core:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      APP_ENV: production
    deploy:
      replicas: ${AI_CORE_REPLICAS:-3}
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  gateway:
    image: ${REGISTRY}projectcell/gateway:${VERSION}
    build: !reset null
    environment:
      GATEWAY_SERVER_MODE: release
      GATEWAY_LOG_LEVEL: info
      GATEWAY_LOG_FORMAT: json
    deploy:
      replicas: ${GATEWAY_REPLICAS:-3}
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  web:
    image: ${REGISTRY}projectcell/web:${VERSION}
    build: !reset null
    restart: unless-stopped
    deploy:
      replicas: ${WEB_REPLICAS:-2}
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  postgres:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  traefik:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${GRPC_PORT:-50051}:50051"
    volumes:
      - ../traefik/traefik-prod.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  redis-master:
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --maxmemory 512mb
      --requirepass ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
