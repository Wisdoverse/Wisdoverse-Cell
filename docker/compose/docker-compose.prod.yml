    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${PM_AGENT_DB_PASSWORD:?PM_AGENT_DB_PASSWORD is required}
    deploy:
      replicas: ${PM_AGENT_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  chat-agent:
    image: ${REGISTRY}projectcell/chat-agent:${VERSION}
    build: !reset null
    environment:
      DEBUG: "false"
      APP_ENV: production
      POSTGRES_PASSWORD: ${CHAT_AGENT_DB_PASSWORD:?CHAT_AGENT_DB_PASSWORD is required}
    deploy:
      replicas: ${CHAT_AGENT_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
