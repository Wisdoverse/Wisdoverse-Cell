# =============================================================================
# Cloud-Native Proxy Layer — Traefik
# =============================================================================

services:
  traefik:
    image: traefik:v3.6
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-traefik
    hostname: traefik
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${GRPC_PORT:-50051}:50051"
      - "8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    restart: unless-stopped
    labels:
      - "traefik.enable=false"

networks:
  frontend:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_frontend
    external: true
