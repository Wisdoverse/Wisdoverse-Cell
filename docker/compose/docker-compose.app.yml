# =============================================================================
# Cloud-Native Application Layer
# =============================================================================
# Gateway (Rust) + requirement manager agent with Traefik service discovery labels.
# The ai-core service id is kept for runtime compatibility.
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# CN mirror build args — activated via .env or docs/examples/cn-build-mirrors.env.example
x-python-mirror-args: &python-mirror-args
  PIP_INDEX_URL: ${PIP_INDEX_URL:-}
  PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
  APT_MIRROR: ${APT_MIRROR:-}

x-llm-env: &llm-env
  LLM_PROVIDER: ${LLM_PROVIDER:-litellm}
  DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic/claude-sonnet-4-20250514}
  CHAT_MODEL: ${CHAT_MODEL:-anthropic/claude-sonnet-4-20250514}
  SUMMARY_MODEL: ${SUMMARY_MODEL:-anthropic/claude-haiku-4-5-20251001}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  LITELLM_API_BASE: ${LITELLM_API_BASE:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

x-app-security-env: &app-security-env
  SECRET_KEY: ${SECRET_KEY:-dev-only-change-in-production}
  PM_API_KEY: ${PM_API_KEY:-}
  INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
  INTERNAL_TRANSPORT_PROTECTION: ${INTERNAL_TRANSPORT_PROTECTION:-}
  A2A_JWT_SECRET: ${A2A_JWT_SECRET:-dev-only-change-in-production}
  CONTROL_PLANE_ENABLED: ${CONTROL_PLANE_ENABLED:-false}
  CONTROL_PLANE_COMPANY_ID: ${CONTROL_PLANE_COMPANY_ID:-cmp_wisdoverse_cell}
  CONTROL_PLANE_APPROVAL_ENFORCED: ${CONTROL_PLANE_APPROVAL_ENFORCED:-false}
  CONTROL_PLANE_LLM_BUDGET_ENFORCED: ${CONTROL_PLANE_LLM_BUDGET_ENFORCED:-false}
  CONTROL_PLANE_TOOL_BUDGET_ENFORCED: ${CONTROL_PLANE_TOOL_BUDGET_ENFORCED:-false}
  CONTROL_PLANE_LOCAL_ADAPTER_ENABLED: ${CONTROL_PLANE_LOCAL_ADAPTER_ENABLED:-false}
  CONTROL_PLANE_LOCAL_ADAPTER_ALLOWLIST: ${CONTROL_PLANE_LOCAL_ADAPTER_ALLOWLIST:-}

services:
  # ===========================================================================
# Requirement manager agent (HTTP + gRPC), using the ai-core runtime service id.
  # ===========================================================================
  ai-core:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.agents
      target: ai-core
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
    image: ${REGISTRY:-}wisdoverse/cell-ai-core:${VERSION:-latest}
    hostname: ai-core
    environment:
      # Database — via PgBouncer
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "6432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${POSTGRES_USER:-wisdoverse-cell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      # NATS / Event Bus
      NATS_URL: nats://nats-1:4222,nats://nats-2:4222,nats://nats-3:4222
      NATS_STREAM_REPLICAS: "3"
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      EVENT_BUS_CONSUMER_NAME: requirement-manager
      # Database Read Replica (optional, for read/write split)
      DB_READ_HOST: ${DB_READ_HOST:-}
      DB_READ_PORT: ${DB_READ_PORT:-5432}
      # Vector DB
      MILVUS_URI: http://milvus:19530
      # gRPC
      GRPC_PORT: "50051"
      # HTTP API
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      # LLM
      <<: [*llm-env, *app-security-env]
      # Application
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Tracing
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-http://tempo:4317}
      OTEL_SERVICE_NAME: ai-core
    networks:
      - frontend
      - backend
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: ${AI_CORE_REPLICAS:-3}
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    stop_grace_period: 45s
    restart: unless-stopped
    labels:
      # Traefik HTTP routing
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_frontend"
      - "traefik.http.routers.ai-core.rule=PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`) || PathPrefix(`/metrics`)"
      - "traefik.http.routers.ai-core.entrypoints=web"
      - "traefik.http.routers.ai-core.service=ai-core"
      - "traefik.http.services.ai-core.loadbalancer.server.port=8000"
      - "traefik.http.services.ai-core.loadbalancer.healthCheck.path=/health"
      - "traefik.http.services.ai-core.loadbalancer.healthCheck.interval=10s"
      # Traefik gRPC routing
      - "traefik.http.routers.ai-core-grpc.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ai-core-grpc.entrypoints=grpc"
      - "traefik.http.routers.ai-core-grpc.service=ai-core-grpc"
      - "traefik.http.services.ai-core-grpc.loadbalancer.server.port=50051"
      - "traefik.http.services.ai-core-grpc.loadbalancer.server.scheme=h2c"

  # ===========================================================================
  # Gateway - Rust HTTP Gateway (Feishu/WeChat)
  # ===========================================================================
  gateway:
    build:
      context: ../..
      dockerfile: rust/gateway/Dockerfile
      args:
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    image: ${REGISTRY:-}wisdoverse/cell-rust-gateway:${VERSION:-latest}
    hostname: gateway
    environment:
      GATEWAY_IMPLEMENTATION: rust
      GATEWAY_SERVER_PORT: "8080"
      GATEWAY_SERVER_MODE: ${GATEWAY_MODE:-release}
      GATEWAY_SERVER_READ_TIMEOUT: 30s
      GATEWAY_SERVER_WRITE_TIMEOUT: 30s
      # gRPC to requirement manager agent
      GATEWAY_GRPC_AI_SERVICE_ADDR: ai-core:50051
      GATEWAY_GRPC_TIMEOUT: 30s
      GATEWAY_GRPC_MAX_RETRIES: 3
      # Redis
      GATEWAY_REDIS_ADDR: redis:6379
      # Rate Limit
      GATEWAY_RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-true}
      GATEWAY_RATELIMIT_RPS: ${RATELIMIT_RPS:-100}
      GATEWAY_RATELIMIT_BURST_SIZE: ${RATELIMIT_BURST:-200}
      # Feishu
      GATEWAY_FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      GATEWAY_FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      GATEWAY_FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      GATEWAY_FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
      GATEWAY_FEISHU_OPEN_API_BASE_URL: ${FEISHU_OPEN_API_BASE_URL:-https://open.feishu.cn/open-apis}
      GATEWAY_FEISHU_VERIFY_SIGNATURE: "true"
      GATEWAY_FEISHU_CHAT_AGENT_ADDR: chat-agent:8013
      GATEWAY_FEISHU_PM_AGENT_ADDR: pjm-agent:8012
      GATEWAY_FEISHU_INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
      # WeCom
      GATEWAY_WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      GATEWAY_WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      GATEWAY_WECOM_SECRET: ${WECOM_SECRET:-}
      GATEWAY_WECOM_API_BASE_URL: ${WECOM_API_BASE_URL:-https://qyapi.weixin.qq.com/cgi-bin}
      GATEWAY_WECOM_TOKEN: ${WECOM_TOKEN:-}
      GATEWAY_WECOM_ENCODING_AES_KEY: ${WECOM_ENCODING_AES_KEY:-}
      # Logging
      GATEWAY_LOG_LEVEL: ${LOG_LEVEL:-info}
      GATEWAY_LOG_FORMAT: ${LOG_FORMAT:-json}
    networks:
      - frontend
      - backend
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: ${GATEWAY_REPLICAS:-3}
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging: *default-logging
    stop_grace_period: 15s
    restart: unless-stopped
    labels:
      # Traefik HTTP routing
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_frontend"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/webhook`) || Path(`/ready`) || PathPrefix(`/api/feishu`) || PathPrefix(`/api/wecom`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.priority=200"
      - "traefik.http.routers.gateway.service=gateway"
      - "traefik.http.routers.gateway.middlewares=ratelimit@file,circuit-breaker@file"
      - "traefik.http.services.gateway.loadbalancer.server.port=8080"
      - "traefik.http.services.gateway.loadbalancer.healthCheck.path=/health"
      - "traefik.http.services.gateway.loadbalancer.healthCheck.interval=10s"

  # ===========================================================================
  # Business runtime agents and support capability modules
  # ===========================================================================
  sync-module:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.agents
      target: sync-module
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-sync-module:${VERSION:-latest}
    hostname: sync-module
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${SYNC_MODULE_DB_USER:-sync_agent}
      POSTGRES_PASSWORD: ${SYNC_MODULE_DB_PASSWORD:-sync_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "3"
      OPENPROJECT_URL: ${OPENPROJECT_URL:-}
      OPENPROJECT_API_KEY: ${OPENPROJECT_API_KEY:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_BITABLE_APP_TOKEN: ${FEISHU_BITABLE_APP_TOKEN:-}
      FEISHU_BITABLE_TABLE_ID: ${FEISHU_BITABLE_TABLE_ID:-}
      <<: *app-security-env
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      OTEL_SERVICE_NAME: sync-module
      EVENT_BUS_CONSUMER_NAME: sync-module
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: ${SYNC_MODULE_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging
    stop_grace_period: 35s
    restart: unless-stopped

