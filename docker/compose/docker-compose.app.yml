    hostname: evolution-module
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${EVOLUTION_MODULE_DB_USER:-evolution_agent}
      POSTGRES_PASSWORD: ${EVOLUTION_MODULE_DB_PASSWORD:-evolution_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "7"
      <<: [*llm-env, *app-security-env]
      EVOLUTION_ENABLED: ${EVOLUTION_ENABLED:-true}
      EVOLUTION_COLLABORATION_ENABLED: ${EVOLUTION_COLLABORATION_ENABLED:-false}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      OTEL_SERVICE_NAME: evolution-module
      EVENT_BUS_CONSUMER_NAME: evolution-module
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8016/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: ${EVOLUTION_MODULE_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging
    stop_grace_period: 35s
    restart: unless-stopped

  # ===========================================================================
  # Web — Next.js Frontend
  # ===========================================================================
  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    image: ${REGISTRY:-}wisdoverse/cell-web:${VERSION:-latest}
    hostname: web
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      WEBUI_ADMIN_STORE_PATH: ${WEBUI_ADMIN_STORE_PATH:-/app/data/webui-admin.json}
      ENABLE_DEV_AUTH: ${ENABLE_DEV_AUTH:-false}
      DEV_AUTH_USERNAME: ${DEV_AUTH_USERNAME:-}
      DEV_AUTH_PASSWORD: ${DEV_AUTH_PASSWORD:-}
      DEV_AUTH_DISPLAY_NAME: ${DEV_AUTH_DISPLAY_NAME:-Dev}
      DEV_AUTH_ROLE: ${DEV_AUTH_ROLE:-admin}
    volumes:
      - web_auth_data:/app/data
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/zh/login').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: ${WEB_REPLICAS:-2}
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    stop_grace_period: 15s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_frontend"
      - "traefik.http.routers.web-auth.rule=PathPrefix(`/api/auth`)"
      - "traefik.http.routers.web-auth.entrypoints=web"
      - "traefik.http.routers.web-auth.priority=300"
      - "traefik.http.routers.web-auth.service=web"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.routers.web.service=web"
      - "traefik.http.routers.web.middlewares=compress@file,security-headers@file"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.http.services.web.loadbalancer.healthCheck.path=/api/auth/session"
      - "traefik.http.services.web.loadbalancer.healthCheck.interval=10s"


networks:
  frontend:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_frontend
    driver: bridge
  backend:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_backend
    external: true

volumes:
  web_auth_data:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_web_auth_data
