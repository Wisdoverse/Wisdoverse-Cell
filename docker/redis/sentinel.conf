# =============================================================================
# Redis Sentinel Configuration
# =============================================================================
# Quorum: 2 of 3 sentinels must agree for failover

port 26379

sentinel monitor projectcell redis-master 6379 2
sentinel down-after-milliseconds projectcell 5000
sentinel failover-timeout projectcell 10000
sentinel parallel-syncs projectcell 1
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
