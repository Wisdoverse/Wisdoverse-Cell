# =============================================================================
# Redis Sentinel Configuration
# =============================================================================
# Quorum: 2 of 3 sentinels must agree for failover

port 26379

sentinel monitor wisdoverse-cell redis-master 6379 2
sentinel down-after-milliseconds wisdoverse-cell 5000
sentinel failover-timeout wisdoverse-cell 10000
sentinel parallel-syncs wisdoverse-cell 1
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
