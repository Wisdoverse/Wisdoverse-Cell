# =============================================================================
# Redis Configuration — Shared (Master + Replicas)
# =============================================================================

# Persistence
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Network
tcp-keepalive 60
timeout 0
tcp-backlog 511

# Performance
hz 10
dynamic-hz yes
