# =============================================================================
# PostgreSQL Primary Configuration
# =============================================================================

# --- Replication ---
wal_level = replica
max_wal_senders = 3
wal_keep_size = '256MB'
synchronous_commit = on
hot_standby = on

# --- Connections ---
max_connections = 200
listen_addresses = '*'

# --- Memory ---
shared_buffers = '256MB'
effective_cache_size = '512MB'
work_mem = '4MB'
maintenance_work_mem = '64MB'

# --- WAL ---
wal_buffers = '8MB'
checkpoint_completion_target = 0.9
max_wal_size = '1GB'
min_wal_size = '80MB'

# --- Logging ---
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
