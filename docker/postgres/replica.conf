# =============================================================================
# PostgreSQL Replica Configuration
# =============================================================================

# --- Replication ---
hot_standby = on

# --- Connections ---
max_connections = 200
listen_addresses = '*'

# --- Memory (lighter for read-only workload) ---
shared_buffers = '128MB'
effective_cache_size = '256MB'
work_mem = '4MB'

# --- Logging ---
log_min_duration_statement = 500
