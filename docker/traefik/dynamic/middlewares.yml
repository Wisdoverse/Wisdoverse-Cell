http:
  middlewares:
    ratelimit:
      rateLimit:
        average: 1000
        burst: 2000
        period: "1s"

    circuit-breaker:
      circuitBreaker:
        expression: "ResponseCodeRatio(500, 600, 0, 600) > 0.25"

    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"

    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""

    retry:
      retry:
        attempts: 3
        initialInterval: "100ms"
