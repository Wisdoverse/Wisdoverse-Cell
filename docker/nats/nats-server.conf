server_name: $NATS_SERVER_NAME

listen: 0.0.0.0:4222

http_port: 8222

jetstream {
  store_dir: /data/jetstream
  max_mem: 256MB
  max_file: 2GB
}

cluster {
  name: projectcell
  listen: 0.0.0.0:6222

  routes: [
    nats-route://nats-1:6222
    nats-route://nats-2:6222
    nats-route://nats-3:6222
  ]
}

debug: false
trace: false
logtime: true

max_connections: 1024
max_payload: 1MB
max_pending: 64MB

server_tags: ["projectcell"]
