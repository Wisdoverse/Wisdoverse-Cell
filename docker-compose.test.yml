# Docker Compose for CI Integration Tests
#
# Usage:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test-runner

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: projectcell_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U test -d projectcell_test && psql -U test -d projectcell_test -c 'SELECT 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Requirement manager agent, deployed under the ai-core runtime service id.
  ai-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      target: ai-core
    image: project_cell-ai-core
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: projectcell_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GRPC_PORT: "50051"
      API_PORT: "8000"
      APP_ENV: test
      SECRET_KEY: test-secret-key
      PM_API_KEY: test-pm-api-key
      INTERNAL_SERVICE_KEY: test-internal-service-key
      A2A_JWT_SECRET: test-a2a-jwt-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - sh
      - -c
      - >-
        alembic upgrade head &&
        exec gunicorn
        --worker-class uvicorn.workers.UvicornWorker
        --workers 1
        --bind 0.0.0.0:8000
        --timeout 120
        --graceful-timeout 30
        --keep-alive 5
        --access-logfile -
        --access-logformat '%(h)s %(l)s %(u)s %(t)s "%(r)s" %(s)s %(b)s %(D)s'
        agents.requirement_manager.app.main:app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Rust Gateway
  gateway:
    build:
      context: .
      dockerfile: rust/gateway/Dockerfile
    environment:
      GATEWAY_GRPC_AI_SERVICE_ADDR: ai-core:50051
      GATEWAY_REDIS_ADDR: redis:6379
      GATEWAY_SERVER_PORT: "8080"
      GATEWAY_SERVER_MODE: test
      GATEWAY_FEISHU_VERIFY_SIGNATURE: "false"
    depends_on:
      ai-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Test Runner
  test-runner:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - .:/app:ro
    environment:
      GATEWAY_URL: http://gateway:8080
      AI_CORE_URL: http://ai-core:8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: projectcell_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      PM_API_KEY: test-pm-api-key
    depends_on:
      gateway:
        condition: service_healthy
      ai-core:
        condition: service_healthy
    command: >
      sh -c "
        PIP_DISABLE_PIP_VERSION_CHECK=1 pip install --root-user-action=ignore -q pytest pytest-asyncio requests httpx grpcio &&
        python -m pytest tests/integration/test_docker_integration.py -v --tb=short -p no:cacheprovider
      "
