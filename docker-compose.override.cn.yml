# =============================================================================
# Docker Compose Override — CN Region Mirrors
# =============================================================================
#
# Faster builds for developers in China mainland:
#   cp docker-compose.override.cn.yml docker-compose.override.yml
#
# This file replaces the active docker-compose.override.yml when copied.
# If you already have local development settings such as volume mounts, merge
# them manually into this file before copying it.
#
# Base image mirrors require Docker daemon configuration:
#   /etc/docker/daemon.json (Linux)
#   ~/.docker/daemon.json (Docker Desktop)
#
#   {
#     "registry-mirrors": [
#       "https://mirror.ccs.tencentyun.com",
#       "https://docker.mirrors.ustc.edu.cn"
#     ]
#   }
#
# Restart Docker after changing daemon configuration:
#   sudo systemctl restart docker
# =============================================================================

services:
  ai-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      target: ai-core
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        APT_MIRROR: mirrors.aliyun.com

  sync-agent:
    build:
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        APT_MIRROR: mirrors.aliyun.com

  analysis-agent:
    build:
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        APT_MIRROR: mirrors.aliyun.com

  pjm-agent:
    build:
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        APT_MIRROR: mirrors.aliyun.com

  chat-agent:
    build:
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        APT_MIRROR: mirrors.aliyun.com

  gateway:
    build:
      args:
        GOPROXY: https://goproxy.cn,direct
        APK_MIRROR: mirrors.aliyun.com
