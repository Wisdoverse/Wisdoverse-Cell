name: Bug report
description: Report a reproducible defect in Wisdoverse Cell.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Commit:
        OS:
        Python:
        Go:
        Node:
        Deployment mode:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact secrets, tokens, and personal data.
      render: shell
