name: Feature request
description: Propose a focused product or engineering improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful solution.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent runtime
        - Gateway
        - Frontend
        - Integrations
        - Security
        - Documentation
        - Operations
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Compatibility, security, cost, or operational considerations.
