name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  public-hygiene:
    name: Public hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Block stale private/public-release references
        run: |
          if [ -f .gitlab-ci.yml ]; then
            echo ".gitlab-ci.yml must not be published on the GitHub public branch"
            exit 1
          fi
          tracked_env_files="$(git ls-files '.env*' | grep -v '^.env.example$' || true)"
          if [ -n "$tracked_env_files" ]; then
            echo "Only .env.example may be tracked on the GitHub public branch"
            echo "$tracked_env_files"
            exit 1
          fi
          if git grep -n -I -E 'Project Cell|projectcell|project_cell|project-cell|project-cell-prd\.md|security@projectcell\.ai|wiki\.projectcell\.ai|itoy\.dev|itoy\.ai|cell\.wisdoverse\.com|--insecure-skip-tls-verify' -- . ':(exclude).github/workflows/ci.yml'; then
            echo "Found stale pre-rebrand identifiers, internal hostnames, or banned flags on the public branch"
            exit 1
          fi

  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check agents/ shared/ skills/ tests/
      - name: Mypy (scoped per pyproject.toml)
        run: make typecheck
      - name: Python dependency audit
        run: |
          pip-audit -r requirements.txt
          pip-audit -r requirements-lock.txt
      - name: Python tests
        run: make test-public

  migrations:
    name: Migration round-trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: wisdoverse_cell
          POSTGRES_PASSWORD: wisdoverse_cell
          POSTGRES_DB: wisdoverse_cell_migration_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U wisdoverse_cell"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Migration round-trip
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://wisdoverse_cell:wisdoverse_cell@127.0.0.1:5433/wisdoverse_cell_migration_test
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5433"
          POSTGRES_USER: wisdoverse_cell
          POSTGRES_PASSWORD: wisdoverse_cell
          POSTGRES_DB: wisdoverse_cell_migration_test
          CONTROL_PLANE_ENABLED: "true"
        run: make migration-test

  rust-gateway:
    name: Rust gateway tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable
      - name: Rust format
        run: cargo fmt --manifest-path rust/Cargo.toml --check
      - name: Rust tests
        run: cargo test --manifest-path rust/Cargo.toml --locked
      - name: Rust clippy
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --locked -- -D warnings
      - name: Rust gateway build
        run: cargo build --manifest-path rust/Cargo.toml --locked -p wisdoverse-cell-rust-gateway
      - name: Rust gateway Docker build
        run: docker build -f rust/gateway/Dockerfile -t wisdoverse/cell-rust-gateway:ci .

  agents-image:
    name: Agents image smoke build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build unified agents image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.agents
          push: false
          tags: wisdoverse/cell-agents:ci
          cache-from: type=gha,scope=cell-agents-ci
          cache-to: type=gha,scope=cell-agents-ci,mode=max

  frontend:
    name: Frontend lint, tests, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
