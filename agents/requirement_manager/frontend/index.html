<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求管理 Dashboard - Wisdoverse Cell</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        header h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #2563eb;
        }

        .stat-card .label {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        .stat-card.pending .number { color: #f59e0b; }
        .stat-card.confirmed .number { color: #10b981; }
        .stat-card.rejected .number { color: #ef4444; }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }

        .tab:hover {
            background: #e5e7eb;
        }

        .tab.active {
            background: #2563eb;
            color: #fff;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .requirement-card {
            border-left: 4px solid #e5e7eb;
        }

        .requirement-card.high { border-left-color: #ef4444; }
        .requirement-card.medium { border-left-color: #f59e0b; }
        .requirement-card.low { border-left-color: #10b981; }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
            margin-right: 4px;
        }

        .badge.status-pending { background: #fef3c7; color: #92400e; }
        .badge.status-confirmed { background: #d1fae5; color: #065f46; }
        .badge.status-rejected { background: #fee2e2; color: #991b1b; }
        .badge.priority-high { background: #fee2e2; color: #991b1b; }
        .badge.priority-medium { background: #fef3c7; color: #92400e; }
        .badge.priority-low { background: #d1fae5; color: #065f46; }
        .badge.category { background: #e0e7ff; color: #3730a3; }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            margin-right: 8px;
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: #10b981;
            color: #fff;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .loading, .empty {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }

        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .filter-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        /* Dashboard Styles */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .dashboard-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .dashboard-card h3 {
            font-size: 14px;
            color: #6b7280;
            font-weight: 500;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chart-container {
            position: relative;
            height: 200px;
        }

        .llm-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .llm-stat-item {
            text-align: center;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .llm-stat-item .value {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
        }

        .llm-stat-item .label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .llm-stat-item.cost .value { color: #dc2626; }
        .llm-stat-item.tokens .value { color: #2563eb; }
        .llm-stat-item.calls .value { color: #059669; }
        .llm-stat-item.latency .value { color: #7c3aed; }

        .circuit-breaker {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            margin-top: 16px;
        }

        .circuit-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .circuit-status.closed { background: #10b981; }
        .circuit-status.open { background: #ef4444; }
        .circuit-status.half-open { background: #f59e0b; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .trend-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .trend-indicator.up { background: #d1fae5; color: #065f46; }
        .trend-indicator.down { background: #fee2e2; color: #991b1b; }
        .trend-indicator.neutral { background: #f3f4f6; color: #6b7280; }

        .quick-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .quick-action-btn {
            flex: 1;
            min-width: 120px;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .quick-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .quick-action-btn .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .quick-action-btn .text {
            font-size: 14px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .llm-stats {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Wisdoverse Cell - 需求管理</h1>
            <p>从会议记录中自动提取、追踪、管理客户需求</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card pending">
                <div class="number" id="stat-pending">-</div>
                <div class="label">待确认</div>
            </div>
            <div class="stat-card confirmed">
                <div class="number" id="stat-confirmed">-</div>
                <div class="label">已确认</div>
            </div>
            <div class="stat-card rejected">
                <div class="number" id="stat-rejected">-</div>
                <div class="label">已拒绝</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-total">-</div>
                <div class="label">总需求</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="dashboard">数据看板</button>
            <button class="tab" data-tab="requirements">需求列表</button>
            <button class="tab" data-tab="upload">上传内容</button>
            <button class="tab" data-tab="questions">待确认问题</button>
        </div>

        <!-- 数据看板 -->
        <div class="panel active" id="panel-dashboard">
            <div class="dashboard-grid">
                <!-- 需求状态分布 -->
                <div class="dashboard-card">
                    <h3>需求状态分布</h3>
                    <div class="chart-container">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>

                <!-- LLM 使用统计 -->
                <div class="dashboard-card">
                    <h3>今日 LLM 使用统计</h3>
                    <div class="llm-stats">
                        <div class="llm-stat-item cost">
                            <div class="value" id="llm-cost">$0.00</div>
                            <div class="label">成本 (USD)</div>
                        </div>
                        <div class="llm-stat-item tokens">
                            <div class="value" id="llm-tokens">0</div>
                            <div class="label">总 Tokens</div>
                        </div>
                        <div class="llm-stat-item calls">
                            <div class="value" id="llm-calls">0</div>
                            <div class="label">调用次数</div>
                        </div>
                        <div class="llm-stat-item latency">
                            <div class="value" id="llm-latency">0ms</div>
                            <div class="label">平均延迟</div>
                        </div>
                    </div>
                    <div class="circuit-breaker">
                        <div class="circuit-status closed" id="circuit-status"></div>
                        <span id="circuit-text">断路器状态: 正常</span>
                    </div>
                </div>

                <!-- 周趋势图 -->
                <div class="dashboard-card" style="grid-column: span 2;">
                    <h3>本周需求趋势</h3>
                    <div class="chart-container" style="height: 250px;">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="dashboard-card">
                <h3>快捷操作</h3>
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="switchTab('upload')">
                        <div class="icon">📝</div>
                        <div class="text">上传会议记录</div>
                    </button>
                    <button class="quick-action-btn" onclick="exportPRD()">
                        <div class="icon">📄</div>
                        <div class="text">导出 PRD</div>
                    </button>
                    <button class="quick-action-btn" onclick="switchTab('requirements'); filterPending()">
                        <div class="icon">⏳</div>
                        <div class="text">待确认需求</div>
                    </button>
                    <button class="quick-action-btn" onclick="refreshDashboard()">
                        <div class="icon">🔄</div>
                        <div class="text">刷新数据</div>
                    </button>
                </div>
            </div>
        </div>

        <!-- 需求列表 -->
        <div class="panel" id="panel-requirements">
            <div class="card">
                <div class="filter-row">
                    <select id="filter-status">
                        <option value="">全部状态</option>
                        <option value="pending">待确认</option>
                        <option value="confirmed">已确认</option>
                        <option value="rejected">已拒绝</option>
                    </select>
                    <select id="filter-priority">
                        <option value="">全部优先级</option>
                        <option value="high">高</option>
                        <option value="medium">中</option>
                        <option value="low">低</option>
                    </select>
                </div>
            </div>
            <div id="requirements-list">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 上传内容 -->
        <div class="panel" id="panel-upload">
            <div class="card">
                <h3 style="margin-bottom: 16px;">上传会议内容</h3>
                <form id="upload-form">
                    <div class="form-group">
                        <label>来源</label>
                        <select name="source" id="upload-source">
                            <option value="upload">手动上传</option>
                            <option value="wechat">微信记录</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>标题（可选）</label>
                        <input type="text" name="title" id="upload-title" placeholder="会议主题">
                    </div>
                    <div class="form-group">
                        <label>会议内容 *</label>
                        <textarea name="content" id="upload-content" placeholder="粘贴会议纪要或聊天记录..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>上下文说明（可选）</label>
                        <input type="text" name="context" id="upload-context" placeholder="例如：1月18日与客户A的需求讨论">
                    </div>
                    <button type="submit" class="btn btn-primary">提取需求</button>
                </form>
            </div>
        </div>

        <!-- 待确认问题 -->
        <div class="panel" id="panel-questions">
            <div id="questions-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 拒绝弹窗 -->
    <div class="modal" id="reject-modal">
        <div class="modal-content">
            <div class="modal-header">拒绝需求</div>
            <div class="form-group">
                <label>拒绝原因</label>
                <textarea id="reject-reason" placeholder="请输入拒绝原因..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-reject-btn">取消</button>
                <button class="btn btn-danger" id="confirm-reject-btn">确认拒绝</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentRejectId = null;
        let statusChart = null;
        let trendChart = null;

        // 工具函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function statusText(status) {
            const map = { pending: '待确认', confirmed: '已确认', rejected: '已拒绝', changed: '已变更' };
            return map[status] || status;
        }

        function priorityText(priority) {
            const map = { high: '高', medium: '中', low: '低' };
            return map[priority] || priority;
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        function createElementWithText(tag, text, className) {
            const el = document.createElement(tag);
            if (className) el.className = className;
            el.textContent = text;
            return el;
        }

        // Tab切换
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
            document.querySelector('.tab[data-tab="' + tabName + '"]').classList.add('active');
            document.getElementById('panel-' + tabName).classList.add('active');
            if (tabName === 'questions') loadQuestions();
            if (tabName === 'dashboard') refreshDashboard();
            if (tabName === 'requirements') loadRequirements();
        }

        document.querySelectorAll('.tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                switchTab(tab.dataset.tab);
            });
        });

        function filterPending() {
            document.getElementById('filter-status').value = 'pending';
            loadRequirements();
        }

        // 加载统计
        async function loadStats() {
            try {
                const res = await fetch(API_BASE + '/stats');
                const data = await res.json();
                const statusCounts = data.requirements_by_status || {};
                document.getElementById('stat-pending').textContent = statusCounts.pending || 0;
                document.getElementById('stat-confirmed').textContent = statusCounts.confirmed || 0;
                document.getElementById('stat-rejected').textContent = statusCounts.rejected || 0;
                const total = Object.values(statusCounts).reduce(function(a, b) { return a + b; }, 0);
                document.getElementById('stat-total').textContent = total;
            } catch (e) {
                console.error('加载统计失败', e);
            }
        }

        // 创建需求卡片
        function createRequirementCard(req) {
            const card = document.createElement('div');
            card.className = 'card requirement-card ' + req.priority;

            // Header
            const header = document.createElement('div');
            header.style.cssText = 'display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;';

            const title = createElementWithText('div', req.title);
            title.style.cssText = 'font-size: 16px; font-weight: 600; color: #1a1a2e;';
            header.appendChild(title);

            const meta = document.createElement('div');
            meta.appendChild(createElementWithText('span', statusText(req.status), 'badge status-' + req.status));
            meta.appendChild(createElementWithText('span', priorityText(req.priority), 'badge priority-' + req.priority));
            meta.appendChild(createElementWithText('span', req.category, 'badge category'));
            header.appendChild(meta);

            card.appendChild(header);

            // Description
            const desc = createElementWithText('div', req.description);
            desc.style.cssText = 'color: #4b5563; font-size: 14px; margin-bottom: 12px;';
            card.appendChild(desc);

            // Quote
            if (req.source_quote) {
                const quote = createElementWithText('div', '"' + req.source_quote + '"');
                quote.style.cssText = 'background: #f3f4f6; padding: 12px; border-radius: 4px; font-size: 13px; color: #6b7280; font-style: italic; margin-bottom: 12px;';
                card.appendChild(quote);
            }

            // Actions for pending
            if (req.status === 'pending') {
                const actions = document.createElement('div');
                actions.style.cssText = 'display: flex; gap: 8px;';

                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'btn btn-success';
                confirmBtn.textContent = '确认';
                confirmBtn.onclick = function() { confirmRequirement(req.id); };
                actions.appendChild(confirmBtn);

                const rejectBtn = document.createElement('button');
                rejectBtn.className = 'btn btn-danger';
                rejectBtn.textContent = '拒绝';
                rejectBtn.onclick = function() { showRejectModal(req.id); };
                actions.appendChild(rejectBtn);

                card.appendChild(actions);
            }

            return card;
        }

        // 加载需求列表
        async function loadRequirements() {
            const status = document.getElementById('filter-status').value;
            const priority = document.getElementById('filter-priority').value;

            let url = API_BASE + '/requirements?';
            if (status) url += 'status=' + status + '&';
            if (priority) url += 'priority=' + priority + '&';

            const list = document.getElementById('requirements-list');

            try {
                const res = await fetch(url);
                const data = await res.json();

                list.textContent = '';

                if (!data.items || data.items.length === 0) {
                    const empty = createElementWithText('div', '暂无需求', 'empty');
                    list.appendChild(empty);
                    return;
                }

                data.items.forEach(function(req) {
                    list.appendChild(createRequirementCard(req));
                });
            } catch (e) {
                console.error('加载需求失败', e);
                list.textContent = '';
                list.appendChild(createElementWithText('div', '加载失败', 'empty'));
            }
        }

        // 创建问题卡片
        function createQuestionCard(q) {
            const card = document.createElement('div');
            card.className = 'card';

            const question = createElementWithText('div', q.question);
            question.style.cssText = 'font-weight: 600; margin-bottom: 8px;';
            card.appendChild(question);

            if (q.context) {
                const context = createElementWithText('div', q.context);
                context.style.cssText = 'color: #666; font-size: 14px; margin-bottom: 12px;';
                card.appendChild(context);
            }

            const formGroup = document.createElement('div');
            formGroup.className = 'form-group';

            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'answer-' + q.id;
            input.placeholder = '输入回答...';
            formGroup.appendChild(input);

            card.appendChild(formGroup);

            const btn = document.createElement('button');
            btn.className = 'btn btn-primary';
            btn.textContent = '提交回答';
            btn.onclick = function() { answerQuestion(q.id); };
            card.appendChild(btn);

            return card;
        }

        // 加载问题
        async function loadQuestions() {
            const list = document.getElementById('questions-list');

            try {
                const res = await fetch(API_BASE + '/questions/open');
                const data = await res.json();

                list.textContent = '';

                if (!data || data.length === 0) {
                    list.appendChild(createElementWithText('div', '暂无待确认问题', 'empty'));
                    return;
                }

                data.forEach(function(q) {
                    list.appendChild(createQuestionCard(q));
                });
            } catch (e) {
                console.error('加载问题失败', e);
            }
        }

        // 上传处理
        document.getElementById('upload-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                source: document.getElementById('upload-source').value,
                title: document.getElementById('upload-title').value || null,
                content: document.getElementById('upload-content').value,
                context: document.getElementById('upload-context').value || null
            };

            try {
                const res = await fetch(API_BASE + '/ingest/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (res.ok) {
                    showToast('成功提取 ' + result.requirements_extracted + ' 个需求', 'success');
                    document.getElementById('upload-form').reset();
                    loadStats();
                    loadRequirements();
                } else {
                    showToast('上传失败: ' + (result.detail || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        });

        // 确认需求
        async function confirmRequirement(id) {
            try {
                const res = await fetch(API_BASE + '/requirements/' + id + '/confirm', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ confirmed_by: 'user' })
                });

                if (res.ok) {
                    showToast('需求已确认', 'success');
                    loadStats();
                    loadRequirements();
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        // 拒绝弹窗
        function showRejectModal(id) {
            currentRejectId = id;
            document.getElementById('reject-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('reject-modal').classList.remove('active');
            currentRejectId = null;
        }

        document.getElementById('cancel-reject-btn').onclick = closeModal;

        document.getElementById('confirm-reject-btn').onclick = async function() {
            const reason = document.getElementById('reject-reason').value;
            if (!reason) {
                showToast('请输入拒绝原因', 'error');
                return;
            }

            try {
                const res = await fetch(API_BASE + '/requirements/' + currentRejectId + '/reject', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason: reason, rejected_by: 'user' })
                });

                if (res.ok) {
                    showToast('需求已拒绝', 'success');
                    closeModal();
                    loadStats();
                    loadRequirements();
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        };

        // 回答问题
        async function answerQuestion(id) {
            const answer = document.getElementById('answer-' + id).value;
            if (!answer) {
                showToast('请输入回答', 'error');
                return;
            }

            try {
                const res = await fetch(API_BASE + '/questions/' + id + '/answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answer: answer, answered_by: 'user' })
                });

                if (res.ok) {
                    showToast('回答已提交', 'success');
                    loadQuestions();
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        // 筛选器事件
        document.getElementById('filter-status').onchange = loadRequirements;
        document.getElementById('filter-priority').onchange = loadRequirements;

        // Dashboard 图表初始化
        function initStatusChart(data) {
            const ctx = document.getElementById('statusChart').getContext('2d');
            if (statusChart) statusChart.destroy();

            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['待确认', '已确认', '已拒绝'],
                    datasets: [{
                        data: [data.pending || 0, data.confirmed || 0, data.rejected || 0],
                        backgroundColor: ['#f59e0b', '#10b981', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { padding: 20, usePointStyle: true }
                        }
                    },
                    cutout: '60%'
                }
            });
        }

        function initTrendChart(data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();

            const labels = data.map(d => d.date);
            const values = data.map(d => d.count);

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '新增需求',
                        data: values,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }

        // 加载 LLM 使用统计
        async function loadLLMStats() {
            try {
                const res = await fetch(API_BASE + '/admin/llm-usage');
                const data = await res.json();

                document.getElementById('llm-cost').textContent = '$' + (data.total_cost_usd || 0).toFixed(2);
                document.getElementById('llm-tokens').textContent = formatNumber(data.total_input_tokens + data.total_output_tokens);
                document.getElementById('llm-calls').textContent = data.total_calls || 0;
                document.getElementById('llm-latency').textContent = (data.avg_latency_ms || 0) + 'ms';
            } catch (e) {
                console.error('加载 LLM 统计失败', e);
            }
        }

        // 加载断路器状态
        async function loadCircuitBreaker() {
            try {
                const res = await fetch(API_BASE + '/admin/circuit-breaker');
                const data = await res.json();

                const statusEl = document.getElementById('circuit-status');
                const textEl = document.getElementById('circuit-text');

                statusEl.className = 'circuit-status ' + data.state.toLowerCase();
                const stateMap = { closed: '正常', open: '断开', 'half-open': '半开' };
                textEl.textContent = '断路器状态: ' + (stateMap[data.state.toLowerCase()] || data.state);
            } catch (e) {
                console.error('加载断路器状态失败', e);
            }
        }

        // 生成模拟趋势数据 (实际应从后端获取)
        function generateTrendData() {
            const data = [];
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                data.push({
                    date: (date.getMonth() + 1) + '/' + date.getDate(),
                    count: Math.floor(Math.random() * 5) + 1
                });
            }
            return data;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // 刷新 Dashboard
        async function refreshDashboard() {
            await loadStats();
            await loadLLMStats();
            await loadCircuitBreaker();

            // 获取增强统计数据
            try {
                const res = await fetch(API_BASE + '/stats/enhanced');
                const data = await res.json();
                initStatusChart(data.requirements_by_status || {});

                // 使用真实趋势数据
                if (data.weekly_trend && data.weekly_trend.length > 0) {
                    initTrendChart(data.weekly_trend);
                } else {
                    initTrendChart(generateTrendData());
                }
            } catch (e) {
                // 降级到基础统计
                try {
                    const res = await fetch(API_BASE + '/stats');
                    const data = await res.json();
                    initStatusChart(data.requirements_by_status || {});
                } catch (e2) {
                    initStatusChart({ pending: 0, confirmed: 0, rejected: 0 });
                }
                initTrendChart(generateTrendData());
            }
        }

        // 导出 PRD
        async function exportPRD() {
            try {
                const res = await fetch(API_BASE + '/export/prd?format=markdown');
                if (res.ok) {
                    const data = await res.json();
                    // 创建下载
                    const blob = new Blob([data.content], { type: 'text/markdown' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'PRD_' + new Date().toISOString().slice(0,10) + '.md';
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('PRD 导出成功', 'success');
                } else {
                    showToast('导出失败', 'error');
                }
            } catch (e) {
                showToast('导出失败: ' + e.message, 'error');
            }
        }

        // 初始化
        refreshDashboard();
    </script>
</body>
</html>
