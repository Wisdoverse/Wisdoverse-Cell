syntax = "proto3";

package requirement;

option go_package = "github.com/Wisdoverse/project-cell/gateway/api/proto/requirement";

// RequirementService - Python AI Core 暴露的需求管理服务
service RequirementService {
  // 需求提取（LLM）
  rpc ExtractRequirements(ExtractRequest) returns (ExtractResponse);

  // 需求列表
  rpc ListRequirements(ListRequest) returns (ListResponse);

  // 获取单个需求
  rpc GetRequirement(GetRequest) returns (Requirement);

  // 确认需求
  rpc ConfirmRequirement(ConfirmRequest) returns (OperationResponse);

  // 拒绝需求
  rpc RejectRequirement(RejectRequest) returns (OperationResponse);

  // 搜索需求
  rpc SearchRequirements(SearchRequest) returns (SearchResponse);

  // 健康检查
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

// === Core Messages ===

message Requirement {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string priority = 5;
  string category = 6;
  string source_quote = 7;
  string confirmed_by = 8;
  int64 confirmed_at = 9;
  string rejection_reason = 10;
  int64 created_at = 11;
  int64 updated_at = 12;
}

// === Request/Response Messages ===

message ExtractRequest {
  string content = 1;
  string source = 2;
  string context = 3;
  repeated string participants = 4;
}

message ExtractResponse {
  bool success = 1;
  string meeting_id = 2;
  repeated Requirement requirements = 3;
  int32 questions_count = 4;
  string error = 5;
}

message ListRequest {
  string status = 1;  // PENDING, CONFIRMED, REJECTED
  int32 page = 2;
  int32 page_size = 3;
}

message ListResponse {
  repeated Requirement requirements = 1;
  int32 total = 2;
  int32 total_pages = 3;
}

message GetRequest {
  string id = 1;
}

message ConfirmRequest {
  string id = 1;
  string confirmed_by = 2;
}

message RejectRequest {
  string id = 1;
  string reason = 2;
  string rejected_by = 3;
}

message OperationResponse {
  bool success = 1;
  Requirement requirement = 2;
  string error = 3;
}

message SearchRequest {
  string keyword = 1;
  string chat_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message SearchResponse {
  repeated Requirement requirements = 1;
  int32 total = 2;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string version = 2;
  map<string, bool> services = 3;  // db, redis, llm
}
