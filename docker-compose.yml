# =============================================================================
# Wisdoverse Cell - Docker Compose (Base Configuration)
# =============================================================================
#
# Production-grade defaults:
# - Externalized environment variables (.env)
# - CPU and memory limits
# - Health checks
# - Structured log rotation
# - Network isolation
# - Security-oriented defaults
#
# Usage:
#   docker compose up -d                     # Start all services
#   docker compose --profile monitoring up   # Start monitoring stack
#   docker compose logs -f gateway           # Follow gateway logs
#   docker compose down -v                   # Stop and remove volumes
#
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    labels: "service,environment"

# CN mirror build args — activated via .env or docs/examples/cn-build-mirrors.env.example
x-python-mirror-args: &python-mirror-args
  PIP_INDEX_URL: ${PIP_INDEX_URL:-}
  PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
  APT_MIRROR: ${APT_MIRROR:-}

x-llm-env: &llm-env
  LLM_PROVIDER: ${LLM_PROVIDER:-litellm}
  DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic/claude-sonnet-4-20250514}
  CHAT_MODEL: ${CHAT_MODEL:-anthropic/claude-sonnet-4-20250514}
  SUMMARY_MODEL: ${SUMMARY_MODEL:-anthropic/claude-haiku-4-5-20251001}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  LITELLM_API_BASE: ${LITELLM_API_BASE:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

x-app-security-env: &app-security-env
  SECRET_KEY: ${SECRET_KEY:-dev-only-change-in-production}
  PM_API_KEY: ${PM_API_KEY:-}
  INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
  INTERNAL_TRANSPORT_PROTECTION: ${INTERNAL_TRANSPORT_PROTECTION:-}
  A2A_JWT_SECRET: ${A2A_JWT_SECRET:-dev-only-change-in-production}
  CONTROL_PLANE_ENABLED: ${CONTROL_PLANE_ENABLED:-false}
  CONTROL_PLANE_COMPANY_ID: ${CONTROL_PLANE_COMPANY_ID:-cmp_wisdoverse_cell}
  CONTROL_PLANE_APPROVAL_ENFORCED: ${CONTROL_PLANE_APPROVAL_ENFORCED:-false}
  CONTROL_PLANE_LLM_BUDGET_ENFORCED: ${CONTROL_PLANE_LLM_BUDGET_ENFORCED:-false}
  CONTROL_PLANE_TOOL_BUDGET_ENFORCED: ${CONTROL_PLANE_TOOL_BUDGET_ENFORCED:-false}
  CONTROL_PLANE_LOCAL_ADAPTER_ENABLED: ${CONTROL_PLANE_LOCAL_ADAPTER_ENABLED:-false}
  CONTROL_PLANE_LOCAL_ADAPTER_ALLOWLIST: ${CONTROL_PLANE_LOCAL_ADAPTER_ALLOWLIST:-}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-deploy-defaults: &deploy-defaults
  resources:
    limits:
      memory: 512M
    reservations:
      memory: 256M

services:
  # ===========================================================================
  # Infrastructure Layer
  # ===========================================================================

  postgres:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${POSTGRES_USER:-wisdoverse-cell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CHAT_AGENT_DB_PASSWORD: ${CHAT_AGENT_DB_PASSWORD:-chat_agent_dev}
      PM_AGENT_DB_PASSWORD: ${PM_AGENT_DB_PASSWORD:-pjm_agent_dev}
      SYNC_MODULE_DB_PASSWORD: ${SYNC_MODULE_DB_PASSWORD:-sync_agent_dev}
      ANALYSIS_MODULE_DB_PASSWORD: ${ANALYSIS_MODULE_DB_PASSWORD:-analysis_agent_dev}
      QA_AGENT_DB_PASSWORD: ${QA_AGENT_DB_PASSWORD:-qa_agent_dev}
      DEV_AGENT_DB_PASSWORD: ${DEV_AGENT_DB_PASSWORD:-dev_agent_dev}
      EVOLUTION_MODULE_DB_PASSWORD: ${EVOLUTION_MODULE_DB_PASSWORD:-evolution_agent_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wisdoverse-cell} -d ${POSTGRES_DB:-wisdoverse-cell}"]
      interval: 10s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=database"
      - "com.wisdoverse-cell.tier=infrastructure"

  redis:
    image: redis:8-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-redis
    hostname: redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        set -e
        REDIS_ARGS="--appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --tcp-keepalive 60 --timeout 0"
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server $$REDIS_ARGS --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server $$REDIS_ARGS
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=cache"
      - "com.wisdoverse-cell.tier=infrastructure"

  milvus:
    image: milvusdb/milvus:v2.6.10
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-milvus
    hostname: milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
    networks:
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      start_period: 90s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=vector-db"
      - "com.wisdoverse-cell.tier=infrastructure"

  # ===========================================================================
  # Application Layer
  # ===========================================================================

  ai-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["ai-core"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-ai-core
    hostname: ai-core
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${POSTGRES_USER:-wisdoverse-cell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      # Vector DB (Milvus)
      MILVUS_URI: http://milvus:19530
      # gRPC
      GRPC_PORT: "50051"
      # HTTP API
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      # LLM
      <<: [*llm-env, *app-security-env]
      # Application
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Tracing (optional)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-}
      OTEL_SERVICE_NAME: ai-core
      EVENT_BUS_CONSUMER_NAME: requirement-manager
      # Inter-service communication
      PM_AGENT_URL: http://pjm-agent:8012
    ports:
      - "${AI_CORE_HTTP_PORT:-8000}:8000"
      - "${AI_CORE_GRPC_PORT:-50051}:50051"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=ai-core"
      - "com.wisdoverse-cell.tier=application"
      - "com.wisdoverse-cell.version=${VERSION:-dev}"

  gateway:
    build:
      context: .
      dockerfile: rust/gateway/Dockerfile
      args:
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    image: ${REGISTRY:-}wisdoverse/cell-rust-gateway:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-gateway
    hostname: gateway
    environment:
      GATEWAY_IMPLEMENTATION: rust
      # Server
      GATEWAY_SERVER_PORT: "8080"
      GATEWAY_SERVER_MODE: ${GATEWAY_MODE:-release}
      GATEWAY_SERVER_READ_TIMEOUT: 30s
      GATEWAY_SERVER_WRITE_TIMEOUT: 30s
      # gRPC
      GATEWAY_GRPC_AI_SERVICE_ADDR: ai-core:50051
      GATEWAY_GRPC_TIMEOUT: 30s
      GATEWAY_GRPC_MAX_RETRIES: 3
      # Redis
      GATEWAY_REDIS_ADDR: redis:6379
      # Rate Limit
      GATEWAY_RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-true}
      GATEWAY_RATELIMIT_RPS: ${RATELIMIT_RPS:-100}
      GATEWAY_RATELIMIT_BURST_SIZE: ${RATELIMIT_BURST:-200}
      # Feishu
      GATEWAY_FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      GATEWAY_FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      GATEWAY_FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      GATEWAY_FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
      GATEWAY_FEISHU_OPEN_API_BASE_URL: ${FEISHU_OPEN_API_BASE_URL:-https://open.feishu.cn/open-apis}
      GATEWAY_FEISHU_VERIFY_SIGNATURE: "true"
      GATEWAY_FEISHU_CHAT_AGENT_ADDR: chat-agent:8013
      GATEWAY_FEISHU_PM_AGENT_ADDR: pjm-agent:8012
      GATEWAY_FEISHU_INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
      # WeCom
      GATEWAY_WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      GATEWAY_WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      GATEWAY_WECOM_SECRET: ${WECOM_SECRET:-}
      GATEWAY_WECOM_API_BASE_URL: ${WECOM_API_BASE_URL:-https://qyapi.weixin.qq.com/cgi-bin}
      GATEWAY_WECOM_TOKEN: ${WECOM_TOKEN:-}
      GATEWAY_WECOM_ENCODING_AES_KEY: ${WECOM_ENCODING_AES_KEY:-}
      # Logging
      GATEWAY_LOG_LEVEL: ${LOG_LEVEL:-info}
      GATEWAY_LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks:
      - frontend
      - backend
    depends_on:
      ai-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=gateway"
      - "com.wisdoverse-cell.tier=application"
      - "com.wisdoverse-cell.version=${VERSION:-dev}"

  # ===========================================================================
  # Business runtime agents and support capability modules
  # ===========================================================================

  sync-module:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["sync-module"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-sync-module
    hostname: sync-module
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${SYNC_MODULE_DB_USER:-sync_agent}
      POSTGRES_PASSWORD: ${SYNC_MODULE_DB_PASSWORD:-sync_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "3"
      OPENPROJECT_URL: ${OPENPROJECT_URL:-}
      OPENPROJECT_API_KEY: ${OPENPROJECT_API_KEY:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_BITABLE_APP_TOKEN: ${FEISHU_BITABLE_APP_TOKEN:-}
      FEISHU_BITABLE_TABLE_ID: ${FEISHU_BITABLE_TABLE_ID:-}
      <<: *app-security-env
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${SYNC_MODULE_PORT:-8010}:8010"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
    deploy:
      <<: *deploy-defaults
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
    logging: *default-logging
    restart: unless-stopped
    stop_grace_period: 35s
    labels:
      - "com.wisdoverse-cell.service=sync-module"
      - "com.wisdoverse-cell.tier=application"

  analysis-module:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["analysis-module"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-analysis-module
    hostname: analysis-module
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${ANALYSIS_MODULE_DB_USER:-analysis_agent}
      POSTGRES_PASSWORD: ${ANALYSIS_MODULE_DB_PASSWORD:-analysis_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "4"
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_PM_APP_TOKEN: ${FEISHU_PM_APP_TOKEN:-}
      FEISHU_PM_TASK_TABLE_ID: ${FEISHU_PM_TASK_TABLE_ID:-}
      FEISHU_REPORT_CHAT_ID: ${FEISHU_REPORT_CHAT_ID:-}
      <<: *app-security-env
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${ANALYSIS_MODULE_PORT:-8011}:8011"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
    deploy:
      <<: *deploy-defaults
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
    logging: *default-logging
    restart: unless-stopped
    stop_grace_period: 35s
    labels:
      - "com.wisdoverse-cell.service=analysis-module"
      - "com.wisdoverse-cell.tier=application"

  evolution-module:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["evolution-module"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-evolution-module
    hostname: evolution-module
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${EVOLUTION_MODULE_DB_USER:-evolution_agent}
      POSTGRES_PASSWORD: ${EVOLUTION_MODULE_DB_PASSWORD:-evolution_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "7"
      <<: [*llm-env, *app-security-env]
      EVOLUTION_ENABLED: ${EVOLUTION_ENABLED:-true}
      EVOLUTION_COLLABORATION_ENABLED: ${EVOLUTION_COLLABORATION_ENABLED:-false}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      OTEL_SERVICE_NAME: evolution-module
      EVENT_BUS_CONSUMER_NAME: evolution-module
    ports:
      - "${EVOLUTION_MODULE_PORT:-8016}:8016"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8016/health/ready"]
    deploy:
      <<: *deploy-defaults
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
    logging: *default-logging
    restart: unless-stopped
    stop_grace_period: 35s
    labels:
      - "com.wisdoverse-cell.service=evolution-module"
      - "com.wisdoverse-cell.tier=application"

  pjm-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["pjm-agent"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-pjm-agent
    hostname: pjm-agent
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${PM_AGENT_DB_USER:-pjm_agent}
      POSTGRES_PASSWORD: ${PM_AGENT_DB_PASSWORD:-pjm_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "2"
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_PM_APP_TOKEN: ${FEISHU_PM_APP_TOKEN:-}
      FEISHU_PM_MEMBER_TABLE_ID: ${FEISHU_PM_MEMBER_TABLE_ID:-}
      FEISHU_PM_PROJECT_TABLE_ID: ${FEISHU_PM_PROJECT_TABLE_ID:-}
      FEISHU_PM_TASK_TABLE_ID: ${FEISHU_PM_TASK_TABLE_ID:-}
      FEISHU_PM_WORKLOAD_TABLE_ID: ${FEISHU_PM_WORKLOAD_TABLE_ID:-}
      FEISHU_PM_RULES_TABLE_ID: ${FEISHU_PM_RULES_TABLE_ID:-}
      FEISHU_REPORT_CHAT_ID: ${FEISHU_REPORT_CHAT_ID:-}
      OPENPROJECT_URL: ${OPENPROJECT_URL:-}
      OPENPROJECT_API_KEY: ${OPENPROJECT_API_KEY:-}
      <<: [*llm-env, *app-security-env]
      DECOMPOSE_PROJECT_IDS: ${DECOMPOSE_PROJECT_IDS:-}
      DECOMPOSE_NOTIFY_OPEN_ID: ${DECOMPOSE_NOTIFY_OPEN_ID:-}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      OTEL_SERVICE_NAME: pjm-agent
      EVENT_BUS_CONSUMER_NAME: pjm-agent
    ports:
      - "${PM_AGENT_PORT:-8012}:8012"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
    deploy:
      <<: *deploy-defaults
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
    logging: *default-logging
    restart: unless-stopped
    stop_grace_period: 35s
    labels:
      - "com.wisdoverse-cell.service=pjm-agent"
      - "com.wisdoverse-cell.tier=application"

  qa-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["qa-agent"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-qa-agent
    hostname: qa-agent
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${QA_AGENT_DB_USER:-qa_agent}
      POSTGRES_PASSWORD: ${QA_AGENT_DB_PASSWORD:-qa_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "5"
      GITLAB_API_URL: ${GITLAB_API_URL:-}
      GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID:-}
      GITLAB_QA_TOKEN: ${GITLAB_QA_TOKEN:-}
      QA_FEISHU_WEBHOOK_URL: ${QA_FEISHU_WEBHOOK_URL:-}
      QA_HIGH_SEVERITY_CHECKS: ${QA_HIGH_SEVERITY_CHECKS:-}
      <<: [*llm-env, *app-security-env]
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      OTEL_SERVICE_NAME: qa-agent
      EVENT_BUS_CONSUMER_NAME: qa-agent
    ports:
      - "${QA_AGENT_PORT:-8014}:8014"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
    deploy:
      <<: *deploy-defaults
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
    logging: *default-logging
    restart: unless-stopped
    stop_grace_period: 35s
    labels:
      - "com.wisdoverse-cell.service=qa-agent"
      - "com.wisdoverse-cell.tier=application"

  dev-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["dev-agent"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-dev-agent
    hostname: dev-agent
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${DEV_AGENT_DB_USER:-dev_agent}
      POSTGRES_PASSWORD: ${DEV_AGENT_DB_PASSWORD:-dev_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "6"
      <<: [*llm-env, *app-security-env]
      DEV_GITLAB_API_URL: ${GITLAB_API_URL:-}
      DEV_GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID:-0}
      DEV_GITLAB_TOKEN: ${GITLAB_DEV_TOKEN:-}
      AGENTFORGE_API_URL: ${AGENTFORGE_API_URL:-http://localhost:4010}
      AGENTFORGE_TOKEN: ${AGENTFORGE_TOKEN:-}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      OTEL_SERVICE_NAME: dev-agent
      EVENT_BUS_CONSUMER_NAME: dev-agent
    ports:
      - "${DEV_AGENT_PORT:-8015}:8015"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8015/health"]
    deploy:
      <<: *deploy-defaults
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
    logging: *default-logging
    restart: unless-stopped
    stop_grace_period: 35s
    labels:
      - "com.wisdoverse-cell.service=dev-agent"
      - "com.wisdoverse-cell.tier=application"

  chat-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["chat-agent"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-chat-agent
    hostname: chat-agent
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${CHAT_AGENT_DB_USER:-chat_agent}
      POSTGRES_PASSWORD: ${CHAT_AGENT_DB_PASSWORD:-chat_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_VERIFY_SIGNATURE: "false"  # Gateway handles verification
      <<: [*llm-env, *app-security-env]
      OPENPROJECT_URL: ${OPENPROJECT_URL:-}
      OPENPROJECT_API_KEY: ${OPENPROJECT_API_KEY:-}
      FEISHU_BITABLE_APP_TOKEN: ${FEISHU_BITABLE_APP_TOKEN:-}
      FEISHU_BITABLE_TABLE_ID: ${FEISHU_BITABLE_TABLE_ID:-}
      FEISHU_BITABLE_MEMBER_TABLE_ID: ${FEISHU_BITABLE_MEMBER_TABLE_ID:-}
      FEISHU_BITABLE_CATEGORY_TABLE_ID: ${FEISHU_BITABLE_CATEGORY_TABLE_ID:-}
      FEISHU_BITABLE_REPORT_TABLE_ID: ${FEISHU_BITABLE_REPORT_TABLE_ID:-}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${CHAT_AGENT_PORT:-8013}:8013"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
    deploy:
      <<: *deploy-defaults
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
    logging: *default-logging
    restart: unless-stopped
    stop_grace_period: 35s
    labels:
      - "com.wisdoverse-cell.service=chat-agent"
      - "com.wisdoverse-cell.tier=application"

  pg-backup:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-pg-backup
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-wisdoverse-cell}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-wisdoverse-cell}
    volumes:
      - pg_backups:/backups
    entrypoint: >
      sh -c "while true; do
        pg_dump -Fc > /backups/backup_$$(date +%Y%m%d_%H%M%S).dump &&
        find /backups -name '*.dump' -mtime +7 -delete;
        sleep 86400;
      done"
    networks:
      - backend
    depends_on:
      - postgres
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=pg-backup"
      - "com.wisdoverse-cell.tier=infrastructure"

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-jaeger
    hostname: jaeger
    profiles:
      - monitoring
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks:
      - backend
    deploy:
      <<: *deploy-defaults
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=tracing"
      - "com.wisdoverse-cell.tier=observability"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-prometheus
    hostname: prometheus
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend
    deploy:
      <<: *deploy-defaults
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=metrics"
      - "com.wisdoverse-cell.tier=observability"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-alertmanager
    hostname: alertmanager
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.listen-address='
    environment:
      ALERTMANAGER_FEISHU_WEBHOOK_URL: ${ALERTMANAGER_FEISHU_WEBHOOK_URL:-http://localhost:9093/api/v1/alerts}
    volumes:
      - ./docker/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=alertmanager"
      - "com.wisdoverse-cell.tier=observability"

# =============================================================================
# Volumes
# =============================================================================

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_postgres_data
    labels:
      - "com.wisdoverse-cell.volume=postgres"
      - "com.wisdoverse-cell.backup=required"

  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_redis_data
    labels:
      - "com.wisdoverse-cell.volume=redis"

  milvus_data:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_milvus_data
    labels:
      - "com.wisdoverse-cell.volume=milvus"
      - "com.wisdoverse-cell.backup=required"

  prometheus_data:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_prometheus_data
    labels:
      - "com.wisdoverse-cell.volume=prometheus"

  alertmanager_data:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_alertmanager_data
    labels:
      - "com.wisdoverse-cell.volume=alertmanager"

  pg_backups:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_pg_backups
    labels:
      - "com.wisdoverse-cell.volume=pg-backups"
      - "com.wisdoverse-cell.backup=required"

# =============================================================================
# Networks
# =============================================================================

networks:
  frontend:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_frontend
    driver: bridge
    labels:
      - "com.wisdoverse-cell.network=frontend"

  backend:
    name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_backend
    driver: bridge
    internal: true
    labels:
      - "com.wisdoverse-cell.network=backend"
