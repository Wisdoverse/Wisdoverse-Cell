# =============================================================================
# Wisdoverse Cell - Docker Compose (Base Configuration)
# =============================================================================
#
# Production-grade defaults:
# - Externalized environment variables (.env)
# - CPU and memory limits
# - Health checks
# - Structured log rotation
# - Network isolation
# - Security-oriented defaults
#
# Usage:
#   docker compose up -d                     # Start all services
#   docker compose --profile monitoring up   # Start monitoring stack
#   docker compose logs -f gateway           # Follow gateway logs
#   docker compose down -v                   # Stop and remove volumes
#
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    labels: "service,environment"

# CN mirror build args — activated via .env or docs/examples/cn-build-mirrors.env.example
x-python-mirror-args: &python-mirror-args
  PIP_INDEX_URL: ${PIP_INDEX_URL:-}
  PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
  APT_MIRROR: ${APT_MIRROR:-}

x-llm-env: &llm-env
  LLM_PROVIDER: ${LLM_PROVIDER:-litellm}
  DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic/claude-sonnet-4-20250514}
  CHAT_MODEL: ${CHAT_MODEL:-anthropic/claude-sonnet-4-20250514}
  SUMMARY_MODEL: ${SUMMARY_MODEL:-anthropic/claude-haiku-4-5-20251001}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  LITELLM_API_BASE: ${LITELLM_API_BASE:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

x-app-security-env: &app-security-env
  SECRET_KEY: ${SECRET_KEY:-dev-only-change-in-production}
  PM_API_KEY: ${PM_API_KEY:-}
  INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
  INTERNAL_TRANSPORT_PROTECTION: ${INTERNAL_TRANSPORT_PROTECTION:-}
  A2A_JWT_SECRET: ${A2A_JWT_SECRET:-dev-only-change-in-production}
  CONTROL_PLANE_ENABLED: ${CONTROL_PLANE_ENABLED:-false}
  CONTROL_PLANE_COMPANY_ID: ${CONTROL_PLANE_COMPANY_ID:-cmp_wisdoverse_cell}
  CONTROL_PLANE_APPROVAL_ENFORCED: ${CONTROL_PLANE_APPROVAL_ENFORCED:-false}
  CONTROL_PLANE_LLM_BUDGET_ENFORCED: ${CONTROL_PLANE_LLM_BUDGET_ENFORCED:-false}
  CONTROL_PLANE_TOOL_BUDGET_ENFORCED: ${CONTROL_PLANE_TOOL_BUDGET_ENFORCED:-false}
  CONTROL_PLANE_LOCAL_ADAPTER_ENABLED: ${CONTROL_PLANE_LOCAL_ADAPTER_ENABLED:-false}
  CONTROL_PLANE_LOCAL_ADAPTER_ALLOWLIST: ${CONTROL_PLANE_LOCAL_ADAPTER_ALLOWLIST:-}
  CELL_BOOTSTRAP_CONTROL_PLANE: ${CELL_BOOTSTRAP_CONTROL_PLANE:-true}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-deploy-defaults: &deploy-defaults
  resources:
    limits:
      memory: 512M
    reservations:
      memory: 256M

services:
  # ===========================================================================
  # Infrastructure Layer
  # ===========================================================================

  postgres:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${POSTGRES_USER:-wisdoverse-cell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CHAT_AGENT_DB_PASSWORD: ${CHAT_AGENT_DB_PASSWORD:-chat_agent_dev}
      PM_AGENT_DB_PASSWORD: ${PM_AGENT_DB_PASSWORD:-pjm_agent_dev}
      SYNC_MODULE_DB_PASSWORD: ${SYNC_MODULE_DB_PASSWORD:-sync_agent_dev}
      ANALYSIS_MODULE_DB_PASSWORD: ${ANALYSIS_MODULE_DB_PASSWORD:-analysis_agent_dev}
      QA_AGENT_DB_PASSWORD: ${QA_AGENT_DB_PASSWORD:-qa_agent_dev}
      DEV_AGENT_DB_PASSWORD: ${DEV_AGENT_DB_PASSWORD:-dev_agent_dev}
      EVOLUTION_MODULE_DB_PASSWORD: ${EVOLUTION_MODULE_DB_PASSWORD:-evolution_agent_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wisdoverse-cell} -d ${POSTGRES_DB:-wisdoverse-cell}"]
      interval: 10s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=database"
      - "com.wisdoverse-cell.tier=infrastructure"

  redis:
    image: redis:8-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-redis
    hostname: redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        set -e
        REDIS_ARGS="--appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --tcp-keepalive 60 --timeout 0"
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server $$REDIS_ARGS --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server $$REDIS_ARGS
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=cache"
      - "com.wisdoverse-cell.tier=infrastructure"

  milvus:
    image: milvusdb/milvus:v2.6.10
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-milvus
    hostname: milvus
    command: ["milvus", "run", "standalone"]
    environment:
      DEPLOY_MODE: STANDALONE
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    expose:
      - "19530"
      - "9091"
    networks:
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      start_period: 90s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=vector-db"
      - "com.wisdoverse-cell.tier=infrastructure"

  # ===========================================================================
  # Application Layer
  # ===========================================================================

  traefik:
    image: traefik:v3.6
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-traefik
    hostname: traefik
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${GRPC_PORT:-50051}:50051"
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - frontend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      start_period: 10s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
      - "com.wisdoverse-cell.service=traefik"
      - "com.wisdoverse-cell.tier=edge"

  # Default user-facing backend runtime. Internal agents and support modules run
  # inside this container; split-agent containers are kept behind the
  # `split-agents` profile for advanced deployments and debugging.
  cell:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["cell"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-cell
    hostname: cell
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${POSTGRES_USER:-wisdoverse-cell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CHAT_AGENT_DB_USER: ${CHAT_AGENT_DB_USER:-chat_agent}
      CHAT_AGENT_DB_PASSWORD: ${CHAT_AGENT_DB_PASSWORD:-chat_agent_dev}
      PM_AGENT_DB_USER: ${PM_AGENT_DB_USER:-pjm_agent}
      PM_AGENT_DB_PASSWORD: ${PM_AGENT_DB_PASSWORD:-pjm_agent_dev}
      SYNC_MODULE_DB_USER: ${SYNC_MODULE_DB_USER:-sync_agent}
      SYNC_MODULE_DB_PASSWORD: ${SYNC_MODULE_DB_PASSWORD:-sync_agent_dev}
      ANALYSIS_MODULE_DB_USER: ${ANALYSIS_MODULE_DB_USER:-analysis_agent}
      ANALYSIS_MODULE_DB_PASSWORD: ${ANALYSIS_MODULE_DB_PASSWORD:-analysis_agent_dev}
      QA_AGENT_DB_USER: ${QA_AGENT_DB_USER:-qa_agent}
      QA_AGENT_DB_PASSWORD: ${QA_AGENT_DB_PASSWORD:-qa_agent_dev}
      DEV_AGENT_DB_USER: ${DEV_AGENT_DB_USER:-dev_agent}
      DEV_AGENT_DB_PASSWORD: ${DEV_AGENT_DB_PASSWORD:-dev_agent_dev}
      EVOLUTION_MODULE_DB_USER: ${EVOLUTION_MODULE_DB_USER:-evolution_agent}
      EVOLUTION_MODULE_DB_PASSWORD: ${EVOLUTION_MODULE_DB_PASSWORD:-evolution_agent_dev}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      MILVUS_URI: http://milvus:19530
      GRPC_PORT: "50051"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      PM_AGENT_URL: http://127.0.0.1:8012
      QA_AGENT_URL: http://127.0.0.1:8014
      SYNC_MODULE_HOST: 127.0.0.1
      SYNC_AGENT_HOST: 127.0.0.1
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_VERIFY_SIGNATURE: "false"
      FEISHU_BITABLE_APP_TOKEN: ${FEISHU_BITABLE_APP_TOKEN:-}
      FEISHU_BITABLE_TABLE_ID: ${FEISHU_BITABLE_TABLE_ID:-}
      FEISHU_BITABLE_MEMBER_TABLE_ID: ${FEISHU_BITABLE_MEMBER_TABLE_ID:-}
      FEISHU_BITABLE_CATEGORY_TABLE_ID: ${FEISHU_BITABLE_CATEGORY_TABLE_ID:-}
      FEISHU_BITABLE_REPORT_TABLE_ID: ${FEISHU_BITABLE_REPORT_TABLE_ID:-}
      FEISHU_PM_APP_TOKEN: ${FEISHU_PM_APP_TOKEN:-}
      FEISHU_PM_MEMBER_TABLE_ID: ${FEISHU_PM_MEMBER_TABLE_ID:-}
      FEISHU_PM_PROJECT_TABLE_ID: ${FEISHU_PM_PROJECT_TABLE_ID:-}
      FEISHU_PM_TASK_TABLE_ID: ${FEISHU_PM_TASK_TABLE_ID:-}
      FEISHU_PM_WORKLOAD_TABLE_ID: ${FEISHU_PM_WORKLOAD_TABLE_ID:-}
      FEISHU_PM_RULES_TABLE_ID: ${FEISHU_PM_RULES_TABLE_ID:-}
      FEISHU_REPORT_CHAT_ID: ${FEISHU_REPORT_CHAT_ID:-}
      OPENPROJECT_URL: ${OPENPROJECT_URL:-}
      OPENPROJECT_API_KEY: ${OPENPROJECT_API_KEY:-}
      GITLAB_API_URL: ${GITLAB_API_URL:-}
      GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID:-}
      GITLAB_QA_TOKEN: ${GITLAB_QA_TOKEN:-}
      GITLAB_DEV_TOKEN: ${GITLAB_DEV_TOKEN:-}
      QA_FEISHU_WEBHOOK_URL: ${QA_FEISHU_WEBHOOK_URL:-}
      QA_HIGH_SEVERITY_CHECKS: ${QA_HIGH_SEVERITY_CHECKS:-}
      DEV_GITLAB_API_URL: ${GITLAB_API_URL:-}
      DEV_GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID:-0}
      DEV_GITLAB_TOKEN: ${GITLAB_DEV_TOKEN:-}
      AGENTFORGE_API_URL: ${AGENTFORGE_API_URL:-http://localhost:4010}
      AGENTFORGE_TOKEN: ${AGENTFORGE_TOKEN:-}
      EVOLUTION_ENABLED: ${EVOLUTION_ENABLED:-true}
      EVOLUTION_COLLABORATION_ENABLED: ${EVOLUTION_COLLABORATION_ENABLED:-false}
      <<: [*llm-env, *app-security-env]
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-}
    expose:
      - "8000"
      - "50051"
      - "8010"
      - "8011"
      - "8012"
      - "8013"
      - "8014"
      - "8015"
      - "8016"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-wisdoverse-cell}_frontend"
      - "traefik.http.routers.cell-api.rule=PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`) || PathPrefix(`/metrics`)"
      - "traefik.http.routers.cell-api.entrypoints=web"
      - "traefik.http.routers.cell-api.priority=200"
      - "traefik.http.routers.cell-api.service=cell-api"
      - "traefik.http.services.cell-api.loadbalancer.server.port=8000"
      - "traefik.http.services.cell-api.loadbalancer.healthCheck.path=/health"
      - "traefik.http.services.cell-api.loadbalancer.healthCheck.interval=10s"
      - "traefik.http.routers.cell-grpc.rule=PathPrefix(`/`)"
      - "traefik.http.routers.cell-grpc.entrypoints=grpc"
      - "traefik.http.routers.cell-grpc.service=cell-grpc"
      - "traefik.http.services.cell-grpc.loadbalancer.server.port=50051"
      - "traefik.http.services.cell-grpc.loadbalancer.server.scheme=h2c"
      - "com.wisdoverse-cell.service=cell"
      - "com.wisdoverse-cell.tier=application"
      - "com.wisdoverse-cell.version=${VERSION:-dev}"

  ai-core:
    profiles: ["split-agents"]
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
      args:
        <<: *python-mirror-args
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: ${REGISTRY:-}wisdoverse/cell-agents:${VERSION:-latest}
    command: ["ai-core"]
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-ai-core
    hostname: ai-core
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wisdoverse-cell}
      POSTGRES_USER: ${POSTGRES_USER:-wisdoverse-cell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      # Vector DB (Milvus)
      MILVUS_URI: http://milvus:19530
      # gRPC
      GRPC_PORT: "50051"
      # HTTP API
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      # LLM
      <<: [*llm-env, *app-security-env]
      # Application
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Tracing (optional)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-}
      OTEL_SERVICE_NAME: ai-core
      EVENT_BUS_CONSUMER_NAME: requirement-manager
      # Inter-service communication
      PM_AGENT_URL: http://pjm-agent:8012
    expose:
      - "8000"
      - "50051"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=ai-core"
      - "com.wisdoverse-cell.tier=application"
      - "com.wisdoverse-cell.version=${VERSION:-dev}"

  gateway:
    build:
      context: .
      dockerfile: rust/gateway/Dockerfile
      args:
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    image: ${REGISTRY:-}wisdoverse/cell-rust-gateway:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-gateway
    hostname: gateway
    environment:
      GATEWAY_IMPLEMENTATION: rust
      # Server
      GATEWAY_SERVER_PORT: "8080"
      GATEWAY_SERVER_MODE: ${GATEWAY_MODE:-release}
      GATEWAY_SERVER_READ_TIMEOUT: 30s
      GATEWAY_SERVER_WRITE_TIMEOUT: 30s
      # gRPC
      GATEWAY_GRPC_AI_SERVICE_ADDR: cell:50051
      GATEWAY_GRPC_TIMEOUT: 30s
      GATEWAY_GRPC_MAX_RETRIES: 3
      # Redis
      GATEWAY_REDIS_ADDR: redis:6379
      # Rate Limit
      GATEWAY_RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-true}
      GATEWAY_RATELIMIT_RPS: ${RATELIMIT_RPS:-100}
      GATEWAY_RATELIMIT_BURST_SIZE: ${RATELIMIT_BURST:-200}
      # Feishu
      GATEWAY_FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      GATEWAY_FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      GATEWAY_FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      GATEWAY_FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
      GATEWAY_FEISHU_OPEN_API_BASE_URL: ${FEISHU_OPEN_API_BASE_URL:-https://open.feishu.cn/open-apis}
      GATEWAY_FEISHU_VERIFY_SIGNATURE: "true"
      GATEWAY_FEISHU_CHAT_AGENT_ADDR: cell:8013
      GATEWAY_FEISHU_PM_AGENT_ADDR: cell:8012
      GATEWAY_FEISHU_INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
      # WeCom
      GATEWAY_WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      GATEWAY_WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      GATEWAY_WECOM_SECRET: ${WECOM_SECRET:-}
      GATEWAY_WECOM_API_BASE_URL: ${WECOM_API_BASE_URL:-https://qyapi.weixin.qq.com/cgi-bin}
      GATEWAY_WECOM_TOKEN: ${WECOM_TOKEN:-}
      GATEWAY_WECOM_ENCODING_AES_KEY: ${WECOM_ENCODING_AES_KEY:-}
      # Logging
      GATEWAY_LOG_LEVEL: ${LOG_LEVEL:-info}
      GATEWAY_LOG_FORMAT: ${LOG_FORMAT:-json}
    expose:
      - "8080"
    networks:
      - frontend
      - backend
    depends_on:
      cell:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging: *default-logging
    restart: unless-stopped
    labels:
      - "com.wisdoverse-cell.service=gateway"
      - "com.wisdoverse-cell.tier=application"
      - "com.wisdoverse-cell.version=${VERSION:-dev}"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    image: ${REGISTRY:-}wisdoverse/cell-web:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-wisdoverse-cell}-web
    hostname: web
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      WEBUI_ADMIN_STORE_PATH: ${WEBUI_ADMIN_STORE_PATH:-/app/data/webui-admin.json}
      WEBUI_BOOTSTRAP_ADMIN_ENABLED: ${WEBUI_BOOTSTRAP_ADMIN_ENABLED:-false}
      WEBUI_BOOTSTRAP_ADMIN_USERNAME: ${WEBUI_BOOTSTRAP_ADMIN_USERNAME:-}
      WEBUI_BOOTSTRAP_ADMIN_PASSWORD: ${WEBUI_BOOTSTRAP_ADMIN_PASSWORD:-}
      WEBUI_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${WEBUI_BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      ENABLE_DEV_AUTH: ${ENABLE_DEV_AUTH:-false}
      DEV_AUTH_USERNAME: ${DEV_AUTH_USERNAME:-}
      DEV_AUTH_PASSWORD: ${DEV_AUTH_PASSWORD:-}
      DEV_AUTH_DISPLAY_NAME: ${DEV_AUTH_DISPLAY_NAME:-Dev}
      DEV_AUTH_ROLE: ${DEV_AUTH_ROLE:-admin}
    volumes:
      - web_auth_data:/app/data
    networks:
      - frontend
    depends_on:
      cell:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/zh/login').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 15s
      start_period: 20s
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    restart: unless-stopped
    labels:
